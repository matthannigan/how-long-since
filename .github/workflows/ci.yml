name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # Reads the pinned pnpm version from package.json's `packageManager`.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit & component tests
        run: pnpm test

      - name: CHANGELOG mentions the current version
        run: |
          node -e "
            const v = require('./package.json').version;
            const log = require('fs').readFileSync('CHANGELOG.md', 'utf8');
            if (!log.includes('[' + v + ']')) {
              console.error('CHANGELOG.md has no entry for version ' + v);
              process.exit(1);
            }
            console.log('CHANGELOG.md mentions ' + v);
          "

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # `pnpm e2e` builds first: the Playwright webServer runs
      # `pnpm build && pnpm preview --port 4173` (see playwright.config.ts),
      # so the suite exercises the production build + service worker.
      - name: End-to-end tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # Req 9.7 tripwire: per-asset sizes of the build the e2e step produced.
      - name: Bundle-size report
        run: |
          {
            echo "### Bundle size (\`dist/\`)"
            echo ""
            echo "| Asset | Raw | Gzipped |"
            echo "|---|---:|---:|"
            for f in dist/assets/*.js dist/assets/*.css dist/assets/*.woff2; do
              [ -e "$f" ] || continue
              raw=$(wc -c < "$f")
              gz=$(gzip -c "$f" | wc -c)
              printf '| `%s` | %s | %s |\n' "$(basename "$f")" \
                "$(numfmt --to=iec "$raw")" \
                "$(numfmt --to=iec "$gz")"
            done
            echo ""
            echo "**Total \`dist/\`:** $(du -sh dist | cut -f1)"
          } >> "$GITHUB_STEP_SUMMARY"
